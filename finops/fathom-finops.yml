url: https://usefathom.com/pricing

billingModel: subscription
description: >
  Fathom Analytics uses a tiered monthly or annual subscription model priced
  by monthly pageview volume. All plans include API access, up to 50 sites,
  event tracking, and forever data retention. There are no per-API-call or
  usage-based charges beyond the pageview tier selection. Annual billing
  provides approximately 17% savings versus monthly. API requests count against
  the monthly pageview quota, so heavy API usage should be factored into tier
  selection.

