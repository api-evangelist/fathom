principles:
  - name: Visibility
    description: >
      Fathom provides straightforward, predictable pricing tied solely to
      monthly pageview volume. There are no hidden fees, per-seat charges,
      or metered API call costs. The pricing page at usefathom.com/pricing
      clearly lists all tier thresholds and prices, enabling organizations
      to forecast costs accurately based on expected traffic.
    actions:
      - Monitor monthly pageview consumption in the Fathom dashboard
      - Track API request volume as API calls count against pageview quota
      - Review the changelog at usefathom.com/changelog for plan changes
      - Use the status page at status.usefathom.com/ to monitor uptime

  - name: Optimization
    description: >
      Organizations can optimize Fathom spend by selecting the appropriate
      pageview tier, switching to annual billing for 17% savings, and
      managing API request frequency (especially aggregation queries) to
      avoid unnecessary pageview quota consumption. Downgrades and upgrades
      are available at any time with no contracts or penalties.
    actions:
      - Choose annual billing to save approximately 17% vs monthly
      - Right-size the pageview tier based on actual traffic analytics
      - Limit high-frequency polling of aggregation and current_visitors
        endpoints to reduce unnecessary pageview quota usage
      - Use cursor-based pagination efficiently to minimize API call volume
      - Contact support@usefathom.com to discuss custom rate limits if
        standard tiers are insufficient
