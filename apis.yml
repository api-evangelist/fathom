apis:
  - aid: fathom:fathom-analytics-api
    name: Fathom Analytics REST API
    description: >
      The Fathom Analytics REST API provides programmatic access to account
      data, sites, events, milestones, aggregation reports, and real-time
      current visitor counts. All requests authenticate via Bearer token and
      use cursor-based pagination. Rate limits differ by endpoint type: 2,000
      requests per hour for site and event management endpoints, and 10
      requests per minute for aggregation and current-visitors reporting
      endpoints.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
