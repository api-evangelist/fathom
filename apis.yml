aid: fathom
name: Fathom Analytics
description: >
  Fathom Analytics is a privacy-first website analytics platform that provides
  GDPR-compliant, cookie-free analytics as an alternative to Google Analytics.
  The platform serves thousands of companies, including Fortune 100 enterprises
  and government agencies, offering simple and accurate traffic metrics without
  tracking personally identifiable information. Fathom exposes a REST API with
  base URL https://api.usefathom.com/v1, enabling developers to manage sites,
  events, and milestones, generate aggregated custom reports, and retrieve
  real-time visitor counts. Authentication is via Bearer token API keys, which
  are generated in the account settings area and support configurable
  permissions scoped to admin, all sites, or individual sites.
type: Index
